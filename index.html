<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#06000F}
body{font-family:'Inter',system-ui,sans-serif;color:#E8DBF0;-webkit-font-smoothing:antialiased}
::selection{background:#FF0044;color:#06000F}
input,select,textarea,button{font-family:inherit;color:inherit}
input:focus,select:focus,textarea:focus{outline:none}
input::placeholder,textarea::placeholder{color:#8B6F95}
input,select,textarea{background:rgba(6,0,15,0.6);border:1px solid rgba(255,0,68,0.2);color:#FFE6EE;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:#FF0044!important;box-shadow:0 0 0 1px #FF0044,0 0 14px rgba(255,0,68,0.35)!important}
button{cursor:pointer;transition:filter .15s}
button:hover:not(:disabled){filter:brightness(1.18)}
button:disabled{opacity:.4;cursor:not-allowed;filter:none}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 12px rgba(255,0,68,.5),0 0 24px rgba(255,0,68,.25)}50%{box-shadow:0 0 18px rgba(255,0,68,.75),0 0 36px rgba(255,0,68,.35)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.view-content{animation:fadeIn .2s ease}
.heat-cell{transition:transform .15s;position:relative}
.heat-cell:hover{transform:scale(1.18);z-index:5}
.tt-row:hover{background:rgba(255,0,68,0.04)!important}
.del-btn{background:transparent;border:none;color:#8B6F95;font-size:16px;line-height:1;padding:4px 6px}
.del-btn:hover{color:#FF0044!important;text-shadow:0 0 8px #FF0044;filter:none!important}
.edit-btn{background:transparent;border:none;color:#8B6F95;font-size:13px;line-height:1;padding:4px 6px;letter-spacing:.05em}
.edit-btn:hover{color:#B864E8!important;text-shadow:0 0 8px #B864E8;filter:none!important}
.chip-btn{transition:all .12s;white-space:nowrap}
.nav-btn{transition:all .15s;white-space:nowrap}
.nav-btn:hover{color:#FFE6EE!important}
textarea{resize:vertical;line-height:1.55}
select{appearance:none;cursor:pointer}
.week-day-dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.req-hint{font-family:'JetBrains Mono',monospace;font-size:9px;color:#FF4466;letter-spacing:.12em;margin-top:6px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:rgba(255,0,68,0.04)}
::-webkit-scrollbar-thumb{background:rgba(255,0,68,0.3);border-radius:2px}
@media(max-width:900px){
  .grid-4{grid-template-columns:repeat(2,1fr)!important}
  .grid-metrics{grid-template-columns:repeat(2,1fr)!important}
  .grid-2col{grid-template-columns:1fr!important}
  .grid-hist{grid-template-columns:80px 1fr 70px 90px 40px!important}
  .hide-mobile{display:none!important}
}

<div style="position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 50% at 85% -10%,rgba(180,30,90,.22),transparent 60%),radial-gradient(ellipse 70% 50% at -10% 110%,rgba(80,20,100,.32),transparent 55%),radial-gradient(ellipse 40% 30% at 30% 40%,rgba(255,0,68,.06),transparent 70%),#06000F"></div>
<div style="position:fixed;inset:0;pointer-events:none;opacity:.55;background-image:radial-gradient(circle,rgba(255,0,68,.08) 1px,transparent 1.4px),radial-gradient(circle,rgba(255,255,255,.025) .6px,transparent 1px);background-size:22px 22px,11px 11px;background-position:0 0,6px 6px;z-index:0"></div>

<div id="app" style="position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:28px 24px 80px"></div>

<script>
// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const KEY='study-tracker-concursos-v2';
const SB_URL='st-sb-url';
const SB_KEY_='st-sb-key';
const DISCS = [
  {name:'Direito Constitucional',      short:'D.CONST', color:'#FF2D66', sub:'CF/88 | JURIS'},
  {name:'Direito Administrativo',      short:'D.ADM',   color:'#FF5577', sub:'8.112 | 14.133'},
  {name:'LGPD',                        short:'LGPD',    color:'#D946A8', sub:'13.709 | ANPD'},
  {name:'Direito Digital / Marco Civil',short:'D.DIG',  color:'#B864E8', sub:'12.965 | 14.690'},
  {name:'Segurança da Informação',     short:'SEG.INF', color:'#8A7CFF', sub:'ISO 27001 | NIST'},
  {name:'Governança de IA',            short:'GOV.IA',  color:'#5AC8FF', sub:'EU AI ACT | OCDE'},
  {name:'Língua Portuguesa',           short:'PORT',    color:'#FFB400', sub:'GRAMÁTICA | TEXTO'},
  {name:'Raciocínio Lógico',           short:'R.LOG',   color:'#39FF7A', sub:'PROPOSIC | ARRANJO'}
];
function getDiscs(){
  const base = DISCS.map(d=>({...d}));
  if(S.customDiscs&&S.customDiscs.length>0){
    S.customDiscs.forEach(c=>{
      if(c.name&&!base.find(b=>b.name===c.name)){
        base.push({name:c.name,short:c.short||c.name.slice(0,8).toUpperCase(),color:c.color||'#B864E8',sub:c.sub||''});
      }
    });
  }
  return base;
}

const BLOCK_META = {
  'Bloco A':  {sub:'Teoria — 2h',         hint:'Conteúdo novo, leitura de lei, aulas'},
  'Bloco B':  {sub:'Teoria — 1h',         hint:'Conteúdo novo, leitura de lei, aulas (bloco curto)'},
  'Bloco C':  {sub:'Questões — 1h',       hint:'Resolução e revisão de questões Cebraspe'},
  'Extra':    {sub:'Opcional',             hint:'Aprofundamento, mapa mental, resumo (tempo livre)'},
  'Revisão':  {sub:'Revisão espaçada',     hint:'Revisão D+1, D+7 ou D+30 após aprendizado inicial'},
  'Simulado': {sub:'Prova completa',       hint:'Simulado cronometrado com todas as disciplinas'}
};
const BLOCKS = ['Bloco A','Bloco B','Bloco C','Extra','Revisão','Simulado'];
const ERR_TYPES = ['Interpretação de enunciado','Gap de conteúdo — não sabia o assunto','Gap de linguagem concursal — sabia mas a formulação confundiu','Erro de atenção / leitura','Desconhecimento de jurisprudência / súmula','Confusão entre institutos similares'];
const MONTHS = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
const WEEK_DAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const DAILY_TARGET_H = 3.5;
const PHRASES = [
  'Mantenha o plano. Você sabia que não seria fácil.',
  'No pior cenário, você aprende. No melhor, isso pode mudar a sua vida inteira.',
  'Acredite no processo. O tempo recompensa quem não desiste.'
];
const WEEKLY_TARGET_H = 17.5;

// ─── STATE ────────────────────────────────────────────────────────────────────
let S = {
  view: 'dashboard',
  userName: 'VIRGINIA — CANDIDATA ANPD',
  phraseIdx: Math.floor(Math.random() * 3),
  sessions: [],
  filter: 'ALL',
  weekFilter: 'all',
  flash: false,
  timer: { active:false, paused:false, startTs:0, accumMs:0, lastTickMs:0 },
  timerDisplay: '00:00:00',
  flashMsg: '',
  editId: null,
  examDate:'',
  examName:'',
  customDiscs:[],
  setupDone:false,
  sbUrl:localStorage.getItem('st-sb-url')||'',
  sbKey:localStorage.getItem('st-sb-key')||'',
  sbStatus:'init',sbError:'',loading:false,
  form:{
    date: todayISO(), block: 'Bloco A', discipline: 'Direito Constitucional',
    hours: '', questions: '', correct: '', errorType: '', notes: ''
  }
};

// ─── DATE UTILS ───────────────────────────────────────────────────────────────
function todayISO(){return new Date().toISOString().slice(0,10)}
function daysAgoISO(n){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-n);return d.toISOString().slice(0,10)}
function fmtShort(iso){if(!iso)return'—';const[,m,d]=iso.split('-');return d+'/'+m}
function fmtLong(iso){if(!iso)return'—';const[y,m,d]=iso.split('-');return d+' '+MONTHS[+m-1]+' '+y}
function todayStamp(){const n=new Date();return n.getDate().toString().padStart(2,'0')+' '+MONTHS[n.getMonth()]+' '+n.getFullYear()}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function discMeta(name){return getDiscs().find(d=>d.name===name)||{color:'#B080A0',short:'?',sub:''}}
function statusFor(acc,hasData){
  if(!hasData)return{color:'#9377A4',label:'NÃO INICIADO'};
  if(acc>0.70)return{color:'#39FF7A',label:'CONSOLIDADA'};
  if(acc>=0.40)return{color:'#FFB400',label:'ATENÇÃO'};
  return{color:'#FF0044',label:'GAP CRÍTICO'};
}
function heatCell(hours,max){
  if(hours<=0)return{bg:'#10071A',border:'rgba(255,0,68,0.08)',glow:'none'};
  const t=Math.min(1,hours/Math.max(max,1));
  if(t<0.25)return{bg:'#3A0820',border:'rgba(255,0,68,0.25)',glow:'0 0 4px rgba(255,0,68,0.15)'};
  if(t<0.55)return{bg:'#7A0030',border:'rgba(255,0,68,0.45)',glow:'0 0 7px rgba(255,0,68,0.35)'};
  if(t<0.80)return{bg:'#C8003C',border:'#FF0044',glow:'0 0 10px rgba(255,0,68,0.55)'};
  return{bg:'#FF0044',border:'#FF6688',glow:'0 0 14px rgba(255,0,68,0.85),inset 0 0 6px rgba(255,180,200,0.3)'};
}
function daysToExam(){
  if(!S.examDate)return null;
  const now=new Date();now.setHours(0,0,0,0);
  const t=new Date(S.examDate+'T00:00:00');
  return Math.max(0,Math.round((t-now)/(1000*60*60*24)));
}
function e(s){return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function thisWeekRange(){
  const now=new Date();now.setHours(0,0,0,0);
  const dow=now.getDay();
  const fromMon=dow===0?6:dow-1;
  const mon=new Date(now);mon.setDate(now.getDate()-fromMon);
  const dates=[];
  for(let d=0;d<7;d++){const dd=new Date(mon);dd.setDate(mon.getDate()+d);dates.push(dd.toISOString().slice(0,10));}
  return dates;
}

// ─── SEED ─────────────────────────────────────────────────────────────────────
function seedSessions(){
  let seed=9173;
  const rand=()=>{seed=(seed*9301+49297)%233280;return seed/233280};
  const notesPool={
    'Direito Constitucional':['Art. 5º — confundi inciso LIV com LV.','Súmula vinculante × repercussão geral.','Controle difuso × concentrado.','Princípio da legalidade × reserva legal.'],
    'Direito Administrativo':['Lei 8.112 — estabilidade × efetividade.','Lei 14.133 — modalidades e dispensa.','Improbidade — Lei 14.230 alterou tudo.','Atos administrativos — atributos × elementos.'],
    'LGPD':['Bases legais para dados sensíveis (Art. 11).','DPO obrigatório × facultativo.','Portabilidade × direito de acesso.','ANPD — competências fiscalizatórias.'],
    'Direito Digital / Marco Civil':['Marco Civil — neutralidade de rede.','Responsabilidade provedores aplicação × conexão.','Direito ao esquecimento — STF tema 786.','Lei Fake News × Marco Civil.'],
    'Segurança da Informação':['CIA triad — pegadinha em vulnerabilidade.','Phishing × spear phishing × whaling.','ISO 27001 — Annex A versão 2022.','NIST × ISO 27035.'],
    'Governança de IA':['EU AI Act — risco proibido × alto × limitado.','Princípios OCDE × UNESCO.','PL 2338/2023 — Marco Legal IA no BR.','Vieses algorítmicos.'],
    'Língua Portuguesa':['Concordância verbal — sujeito posposto.','Crase facultativa × proibida × obrigatória.','Regência verbal — implicar e visar.','Aposto explicativo × restritivo.'],
    'Raciocínio Lógico':['Proposições — condicional × bicondicional.','Arranjo × permutação × combinação.','Probabilidade condicional — Bayes.','De Morgan, contrapositiva.']
  };
  const baseAcc={'Direito Constitucional':0.76,'Direito Administrativo':0.68,'LGPD':0.82,'Direito Digital / Marco Civil':0.61,'Segurança da Informação':0.58,'Governança de IA':0.34,'Língua Portuguesa':0.71,'Raciocínio Lógico':0.42};
  const arr=[];let id=1;
  for(let day=34;day>=0;day--){
    if(rand()<0.20)continue;
    const n=1+Math.floor(rand()*2.4);
    for(let s=0;s<n;s++){
      const disc=DISCS[Math.floor(rand()*DISCS.length)];
      const block=BLOCKS[Math.floor(rand()*3.6)]||'Bloco A';
      const hours=+(0.5+rand()*2.2).toFixed(1);
      const questions=8+Math.floor(rand()*32);
      const acc=Math.max(0.10,Math.min(0.98,baseAcc[disc.name]+(rand()-0.5)*0.28));
      const correct=Math.max(0,Math.min(questions,Math.round(questions*acc)));
      const etPool=['Interpretação de enunciado','Gap de conteúdo — não sabia o assunto','Gap de linguagem concursal — sabia mas a formulação confundiu','Erro de atenção / leitura','Desconhecimento de jurisprudência / súmula'];
      const et=correct===questions?'Sem erros':etPool[Math.floor(rand()*etPool.length)];
      const np=notesPool[disc.name];
      const notes=correct===questions?'Bloco limpo — manter ritmo.':np[Math.floor(rand()*np.length)];
      arr.push({id:id++,date:daysAgoISO(day),block,discipline:disc.name,hours,questions,correct,errorType:et,notes});
    }
  }
  return arr;
}

// ─── STORAGE ──────────────────────────────────────────────────────────────────
function saveLocal(){
  try{localStorage.setItem(KEY,JSON.stringify({sessions:S.sessions,examDate:S.examDate,userName:S.userName,examName:S.examName,customDiscs:S.customDiscs,setupDone:S.setupDone}))}catch(_){}
}
function load(){
  // Carrega dados locais primeiro (fallback imediato)
  try{
    const raw=localStorage.getItem(KEY);
    if(raw){const p=JSON.parse(raw);if(p){
      if(Array.isArray(p.sessions)){
        // Migração: limpar errorType de sessões antigas sem questões
        S.sessions=p.sessions.map(s=>({...s,errorType:(s.questions>0?s.errorType:'')}));
      }
      if(p.examDate)S.examDate=p.examDate;
      if(p.examName)S.examName=p.examName;
      if(Array.isArray(p.customDiscs)&&p.customDiscs.length>0)S.customDiscs=p.customDiscs;
      if(p.setupDone)S.setupDone=true;
      if(p.userName)S.userName=p.userName;
    }}
  }catch(_){}
  // Verifica credenciais Supabase
  S.sbUrl=localStorage.getItem(SB_URL)||'';
  S.sbKey=localStorage.getItem(SB_KEY_)||'';
  if(S.sbUrl&&S.sbKey){S.sbStatus='connecting';render();connectSb();}
  else{S.sbStatus='local';}
}
function save(){
  try{localStorage.setItem(KEY,JSON.stringify({sessions:S.sessions,examDate:S.examDate,userName:S.userName}))}catch(_){}
}
function clearAll(){
  const ans=prompt('Digite LIMPAR (em maiúsculas) para apagar todas as sessões. Esta ação não tem volta.');
  if(ans!=='LIMPAR')return;
  S.sessions=[];S.editId=null;S.view='dashboard';
  saveLocal();render();
  if(sbOk())sbReq('sessions?id=gt.0',{method:'DELETE'}).catch(()=>{});
}
function exportData(){
  const data=JSON.stringify({sessions:S.sessions,examDate:S.examDate,exportedAt:new Date().toISOString()},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='study-tracker-backup-'+todayISO()+'.json';a.click();
  URL.revokeObjectURL(url);
}
function importData(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const p=JSON.parse(ev.target.result);
        if(!Array.isArray(p.sessions))throw new Error('Formato inválido');
        if(!confirm(`Importar ${p.sessions.length} sessões? Os dados atuais serão substituídos.`))return;
        S.sessions=p.sessions;
        if(p.examDate)S.examDate=p.examDate;
        saveLocal();
        if(sbOk()){S.sessions.forEach(s=>sbReq('sessions',{method:'POST',headers:{'Prefer':'return=minimal'},body:JSON.stringify(sToDB(s))}).catch(()=>{}));}
        render();flash('▲ DADOS IMPORTADOS COM SUCESSO');
      }catch(err){alert('Erro ao importar: '+err.message);}
    };
    reader.readAsText(file);
  };
  inp.click();
}


// ─── SUPABASE ─────────────────────────────────────────────────────────────────
function sbOk(){return S.sbStatus==='connected';}
function sbHdr(x={}){return{'Content-Type':'application/json','apikey':S.sbKey,'Authorization':'Bearer '+S.sbKey,...x};}
function dbToS(r){return{id:r.id,date:r.date,block:r.block||'',discipline:r.discipline||'',hours:+r.hours||0,questions:+r.questions||0,correct:+r.correct||0,errorType:r.error_type||'Sem erros',notes:r.notes||''};}
function sToDB(s){return{id:s.id,date:s.date,block:s.block,discipline:s.discipline,hours:s.hours,questions:s.questions,correct:s.correct,error_type:s.errorType,notes:s.notes};}
async function sbReq(path,opts={}){
  const r=await fetch(S.sbUrl+'/rest/v1/'+path,{...opts,headers:sbHdr(opts.headers||{})});
  if(!r.ok){const t=await r.text();throw new Error(r.status+': '+t);}
  return r;
}
async function connectSb(){
  try{
    const r=await sbReq('sessions?select=*&order=id.desc');
    S.sessions=(await r.json()).map(dbToS);
    S.sbStatus='connected';S.sbError='';S.view='dashboard';
  }catch(err){
    S.sbStatus='error';S.sbError=err.message;
    // mantém dados do localStorage como fallback
  }
  S.loading=false;render();
}
function saveSbConfig(){
  const url=document.getElementById('sb-url-inp')?.value?.trim();
  const key=document.getElementById('sb-key-inp')?.value?.trim();
  if(!url||!key){alert('Preencha a URL do projeto e a Anon Key.');return;}
  S.sbUrl=url;S.sbKey=key;
  localStorage.setItem(SB_URL,url);localStorage.setItem(SB_KEY_,key);
  S.sbStatus='connecting';S.loading=true;render();connectSb();
}
function disconnectSb(){
  if(!confirm('Desconectar do Supabase? Seus dados locais ficam intactos.'))return;
  localStorage.removeItem(SB_URL);localStorage.removeItem(SB_KEY_);
  S.sbUrl='';S.sbKey='';S.sbStatus='local';S.sbError='';render();
}

// ─── COMPUTED ─────────────────────────────────────────────────────────────────
function computed(){
  const {sessions,form}=S;
  const today=todayISO();
  const byDate={};
  for(const x of sessions)(byDate[x.date]||(byDate[x.date]=[])).push(x);

  // Metrics
  let streak=0;
  for(let d=0;d<365;d++){
    const iso=daysAgoISO(d);
    if(byDate[iso]&&byDate[iso].length>0)streak++;
    else{if(d===0)continue;break;}
  }
  const last35=Array.from({length:35},(_,i)=>daysAgoISO(34-i));
  const studyDays=last35.filter(d=>byDate[d]).length;
  const totalHours=sessions.reduce((a,x)=>a+x.hours,0);
  const xp=Math.round(totalHours*10);
  const level=Math.floor(xp/100)+1;
  const xpInLevel=xp-(level-1)*100;

  // Weekly progress
  const weekDates=thisWeekRange();
  const weekSessions=sessions.filter(s=>weekDates.includes(s.date));
  const weekHours=+weekSessions.reduce((a,x)=>a+x.hours,0).toFixed(1);
  const weekDaysStudied=new Set(weekSessions.map(s=>s.date)).size;
  const weekDaysDots=weekDates.map(d=>{
    const h=(byDate[d]||[]).reduce((a,x)=>a+x.hours,0);
    const isToday=d===today;
    const isFuture=d>today;
    return{date:d,h,isToday,isFuture,dayLabel:WEEK_DAYS[new Date(d+'T12:00:00').getDay()]};
  });

  // Heatmap
  const hmax=Math.max(1,...last35.map(d=>(byDate[d]||[]).reduce((a,x)=>a+x.hours,0)));
  const heatmap=last35.map(date=>{
    const hrs=(byDate[date]||[]).reduce((a,x)=>a+x.hours,0);
    const c=heatCell(hrs,hmax);
    return{date,hrs,bg:c.bg,border:c.border,glow:c.glow,day:date.slice(8),label:hrs>0?hrs.toFixed(1)+'h — '+fmtLong(date):'sem estudo — '+fmtLong(date)};
  });
  const active=last35.filter(d=>byDate[d]);
  const avgH=active.length>0?(active.reduce((a,d)=>a+(byDate[d]||[]).reduce((b,x)=>b+x.hours,0),0)/active.length).toFixed(1):'0.0';

  // Spaced review D-7
  const srDate=daysAgoISO(7);
  const spaced=(byDate[srDate]||[]).filter(x=>x.correct<x.questions).map(x=>({...x,dc:discMeta(x.discipline).color,errRate:x.questions>0?Math.round(((x.questions-x.correct)/x.questions)*100):0}));

  // Skill map
  const skillMap=getDiscs().map(d=>{
    const ds=sessions.filter(x=>x.discipline===d.name);
    const tq=ds.reduce((a,x)=>a+x.questions,0);
    const tc=ds.reduce((a,x)=>a+x.correct,0);
    const acc=tq>0?tc/tq:0;
    const st=statusFor(acc,tq>0);
    return{...d,tq,tc,acc,st,accLabel:tq>0?Math.round(acc*100)+'%':'—',barW:tq>0?Math.max(2,acc*100)+'%':'2%'};
  });

  // History
  const sessFiltered=S.filter==='ALL'?sessions:sessions.filter(x=>x.discipline===S.filter);
  const hist=[...sessFiltered].sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id).map(x=>{
    const pct=x.questions>0?Math.round((x.correct/x.questions)*100):0;
    const st=statusFor(pct/100,x.questions>0);
    return{...x,dateLabel:fmtShort(x.date),dc:discMeta(x.discipline).color,pctLabel:x.questions>0?pct+'%':'—',pctColor:st.color};
  });

  // Evolução — filter by week
  // Cada semana começa na segunda-feira (ISO 8601).
  // w1 = semana atual, w2 = semana passada, w3 = duas semanas atrás, etc.
  const wf=S.weekFilter;
  let evSessions=sessions;
  let evRangeLabel='';
  if(wf!=='all'){
    const now=new Date();now.setHours(0,0,0,0);
    const dow=now.getDay();
    const fromMon=dow===0?6:dow-1;
    const thisMon=new Date(now);thisMon.setDate(now.getDate()-fromMon);
    if(wf==='thisweek'){
      const start=thisMon.toISOString().slice(0,10);
      const endDate=new Date(thisMon);endDate.setDate(thisMon.getDate()+6);
      const end=endDate.toISOString().slice(0,10);
      evSessions=sessions.filter(s=>s.date>=start&&s.date<=end);
      evRangeLabel=`${fmtShort(start)} → ${fmtShort(end)}`;
    } else if(wf.startsWith('w')){
      const wi=parseInt(wf.slice(1),10);
      const offset=(wi-1)*7;
      const startDate=new Date(thisMon);startDate.setDate(thisMon.getDate()-offset);
      const endDate=new Date(startDate);endDate.setDate(startDate.getDate()+6);
      const start=startDate.toISOString().slice(0,10);
      const end=endDate.toISOString().slice(0,10);
      evSessions=sessions.filter(s=>s.date>=start&&s.date<=end);
      evRangeLabel=`${fmtShort(start)} → ${fmtShort(end)}`;
    }
  }

  const discBars=getDiscs().map(b=>{
    const ds=evSessions.filter(x=>x.discipline===b.name);
    const tq=ds.reduce((a,x)=>a+x.questions,0);
    const tc=ds.reduce((a,x)=>a+x.correct,0);
    const acc=tq>0?tc/tq:0;
    const st=statusFor(acc,tq>0);
    return{name:b.name,short:b.short,color:st.color,accDisplay:tq>0?Math.round(acc*100)+'%':'—',h:tq>0?Math.max(4,acc*100)+'%':'2%'};
  });

  const last14=Array.from({length:14},(_,i)=>daysAgoISO(13-i)).map(date=>{
    const hrs=(byDate[date]||[]).reduce((a,x)=>a+x.hours,0);
    return{date,hrs,day:date.slice(8)};
  });
  const maxD=Math.max(0.5,...last14.map(x=>x.hrs));
  const daily14=last14.map(x=>({...x,h:x.hrs>0?Math.max(3,(x.hrs/maxD)*100)+'%':'3%',color:x.hrs>=DAILY_TARGET_H?'#39FF7A':x.hrs>0?'#FF0044':'rgba(255,0,68,0.1)',glow:x.hrs>0?'0 0 12px rgba(255,0,68,.55)':'none',label:x.hrs>0?x.hrs.toFixed(1):''}));

  const errMap={};
  for(const x of evSessions)if(x.correct<x.questions&&x.errorType&&x.errorType!=='Sem erros')errMap[x.errorType]=(errMap[x.errorType]||0)+(x.questions-x.correct);
  const errList=Object.entries(errMap).map(([t,c])=>({t,c})).sort((a,b)=>b.c-a.c);
  const maxErr=Math.max(1,...errList.map(e=>e.c));
  const errBars=errList.map(e=>({t:e.t,c:e.c,w:(e.c/maxErr*100)+'%'}));

  // Form derived
  const fq=parseInt(form.questions,10),fc=parseInt(form.correct,10),fh=parseFloat(form.hours);
  const fqV=!isNaN(fq)&&fq>=0,fcV=!isNaN(fc)&&fc>=0;
  const fcClamped=fqV&&fcV?Math.min(fc,fq):fc;
  const fpct=(fqV&&fq>0&&fcV)?Math.round((Math.min(fc,fq)/fq)*100):null;
  const fpctSt=statusFor(fpct!=null?fpct/100:0,fpct!=null);
  const fcOverflow=fqV&&fq>0&&fcV&&fc>fq;
  const hasDisc=!!form.discipline;
  const hasDate=!!form.date;
  const hasHours=!isNaN(fh)&&fh>0;
  const hasQ=fqV&&fq>0;
  const hasC=fcV;
  const canSave=hasDate&&hasHours&&hasDisc&&(!hasQ||(hasQ&&hasC));
  let saveHint='';
  if(!hasDate)saveHint='Selecione uma data';
  else if(!hasDisc)saveHint='Selecione uma disciplina';
  else if(!hasHours)saveHint='Informe as horas estudadas';


  // ─── TENDÊNCIA: acerto últimos 14d vs 14d anteriores ──────────────────────
  const trend = getDiscs().map(d => {
    const ds = sessions.filter(x => x.discipline === d.name && x.questions > 0);
    const recent = ds.filter(s => s.date >= daysAgoISO(13));
    const older  = ds.filter(s => s.date >= daysAgoISO(27) && s.date < daysAgoISO(13));
    const rAcc = recent.length > 0 ? recent.reduce((a,x) => a+x.correct, 0) / recent.reduce((a,x) => a+x.questions, 0) : null;
    const oAcc = older.length > 0 ? older.reduce((a,x) => a+x.correct, 0) / older.reduce((a,x) => a+x.questions, 0) : null;
    let dir = 'flat', delta = 0;
    if (rAcc !== null && oAcc !== null) {
      delta = Math.round((rAcc - oAcc) * 100);
      dir = delta > 3 ? 'up' : delta < -3 ? 'down' : 'flat';
    } else if (rAcc !== null && oAcc === null) {
      dir = 'new';
    }
    return { name: d.name, short: d.short || d.name.slice(0,8), color: d.color, rAcc, oAcc, delta, dir, rQ: recent.reduce((a,x) => a+x.questions, 0), oQ: older.reduce((a,x) => a+x.questions, 0) };
  });

  // ─── PREVISÃO DE HORAS ATÉ O EDITAL ──────────────────────────────────────
  const dExam = daysToExam();
  const activeDays14 = Array.from({length:14}, (_,i) => daysAgoISO(13-i)).filter(d => byDate[d]);
  const avgDailyH = activeDays14.length > 0 ? activeDays14.reduce((a,d) => a + (byDate[d]||[]).reduce((b,x) => b+x.hours, 0), 0) / 14 : 0;
  const projectedH = dExam !== null ? +(avgDailyH * dExam).toFixed(0) : null;
  const totalQAll = sessions.reduce((a,x) => a+x.questions, 0);
  const avgQperH = totalHours > 0 ? +(totalQAll / totalHours).toFixed(1) : 0;
  const projectedQ = projectedH !== null && avgQperH > 0 ? Math.round(projectedH * avgQperH) : null;
  const forecast = { dExam, avgDailyH: +avgDailyH.toFixed(2), projectedH, projectedQ, totalQAll, avgQperH };

  // ─── RANKING POR PRIORIDADE (menor acerto primeiro) ───────────────────────
  const priority = getDiscs().map(d => {
    const ds = sessions.filter(x => x.discipline === d.name);
    const tq = ds.reduce((a,x) => a+x.questions, 0);
    const tc = ds.reduce((a,x) => a+x.correct, 0);
    const acc = tq > 0 ? tc/tq : -1;
    const st = statusFor(acc, tq > 0);
    const th = ds.reduce((a,x) => a+x.hours, 0);
    return { name: d.name, short: d.short || d.name.slice(0,8), color: d.color, acc, accLabel: tq > 0 ? Math.round(acc*100)+'%' : '—', st, tq, th: +th.toFixed(1) };
  }).sort((a,b) => {
    // Não iniciado vai pro topo, depois menor acerto
    if (a.acc < 0 && b.acc >= 0) return -1;
    if (b.acc < 0 && a.acc >= 0) return 1;
    if (a.acc < 0 && b.acc < 0) return 0;
    return a.acc - b.acc;
  });

  return{streak,studyDays,totalHours,xp,level,xpInLevel,heatmap,avgH,spaced,srDate,skillMap,hist,discBars,daily14,errBars,maxErr,fpct,fpctSt,fcOverflow,canSave,saveHint,fh,fq:isNaN(fq)?'':fq,fc:isNaN(fc)?'':fc,weekHours,weekDaysStudied,weekDaysDots,evRangeLabel,trend,forecast,priority};
}

      <div id="motiv-phrase" style="font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:500;color:#FFE6EE;line-height:1.5;transition:opacity .6s ease">${e(PHRASES[S.phraseIdx])}</div>
    </div>
  </div>
  ${mh}
  <div style="${card('margin-bottom:18px')}">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div>${sectionTag('// progresso da semana')}<h2 style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;color:#FFE6EE">Semana atual — meta: ${WEEKLY_TARGET_H}h</h2></div>
      <div style="text-align:right">
        <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;color:${wColor};text-shadow:0 0 10px ${wColor}">${c.weekHours}h</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:#B080A0">${wPct}% da meta — ${c.weekDaysStudied} dias</div>

function buildSession(c){
  const f=S.form;
  const isEdit=S.editId!==null;
  const pctColor=c.fpct!=null?c.fpctSt.color:'#8B6F95';
  const pctBorder=c.fpct!=null?c.fpctSt.color:'rgba(255,0,68,.15)';
  const previewColor=discMeta(f.discipline).color;

  let blockChips=BLOCKS.map(b=>{
    const active=f.block===b;
    const meta=BLOCK_META[b];
    return`<div style="flex:1;min-width:0">
      <button class="chip-btn" onclick="setForm('block','${e(b)}')" title="${e(meta.hint)}" style="width:100%;padding:10px 6px;background:${active?'rgba(255,0,68,.18)':'transparent'};border:1px solid ${active?'#FF0044':'rgba(255,0,68,.12)'};color:${active?'#FFE6EE':'#A98FB8'};font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:10px;letter-spacing:.1em;text-transform:uppercase;${active?'box-shadow:0 0 10px rgba(255,0,68,.4)':''}">
        <div>${b}</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:400;color:${active?'#FF8899':'#8B6F95'};margin-top:3px;letter-spacing:.06em;text-transform:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${meta.sub}</div>
      </button>
    </div>`;
  }).join('');

  let discChips=getDiscs().map(d=>{
    const active=f.discipline===d.name;
    return`<button class="chip-btn" onclick="setForm('discipline','${e(d.name)}')" style="padding:10px 8px;background:${active?'rgba(255,0,68,.12)':'rgba(6,0,15,.4)'};border:1px solid ${active?d.color:'rgba(255,255,255,.05)'};color:${active?'#FFE6EE':'#A98FB8'};font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:11px;letter-spacing:.03em;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px;${active?`box-shadow:0 0 10px ${d.color}55`:''}"><span style="width:6px;height:6px;flex-shrink:0;background:${d.color};box-shadow:0 0 5px ${d.color}"></span><span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e(d.name)}</span></button>`;
  }).join('');

  const fh=parseFloat(f.hours);
  const fq=parseInt(f.questions,10)||0;
  const fc=parseInt(f.correct,10)||0;
  const erros=fq>0&&fc>=0?Math.max(0,fq-Math.min(fc,fq)):0;
  const xpGain=!isNaN(fh)&&fh>0?Math.round(fh*10):0;
  const clampedFc=fq>0?Math.min(fc,fq):fc;

  return`<div class="view-content">
  <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px">
    <div>${sectionTag(isEdit?'// editando sessão':'// novo registro')}<h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;color:#FFE6EE">${isEdit?'Editar Sessão':'Registrar Sessão de Estudo'}</h1><div style="font-size:13px;color:#B080A0;margin-top:5px">Data, Disciplina e Horas são obrigatórios</div></div>
    ${isEdit?`<button onclick="cancelEdit()" style="padding:10px 18px;background:transparent;border:1px solid rgba(180,140,200,.25);color:#A98FB8;font-family:'Space Grotesk',sans-serif;font-size:12px;letter-spacing:.15em;text-transform:uppercase">✕ Cancelar edição</button>`:''}
  </div>
  <div class="grid-2col" style="display:grid;grid-template-columns:1.4fr 1fr;gap:20px">
    <div style="${card('padding:26px')}">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
        <div>
          ${lbl('Data',true)}
          <input type="date" value="${e(f.date)}" data-field="date" onchange="setForm('date',this.value)" style="width:100%;padding:11px 12px;color-scheme:dark">
        </div>
        <div>
          ${lbl('Bloco')}
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px">${blockChips}</div>
        </div>
        <div style="grid-column:1/-1">
          ${lbl('Disciplina',true)}
          <div class="grid-4" style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">${discChips}</div>
        </div>
        <div>
          ${lbl('Horas estudadas',true)}
          <input type="number" step="0.25" min="0.25" max="8" placeholder="ex: 1.5" value="${e(f.hours)}" data-field="hours" onchange="setForm('hours',this.value)" style="width:100%;padding:11px 12px">
        </div>
        <div>
          ${lbl('Tipo de Erro')}
          ${(()=>{ 
            const fq=parseInt(f.questions,10),fc=parseInt(f.correct,10);
            const hasQ=!isNaN(fq)&&fq>0;
            const allCorrect=hasQ&&!isNaN(fc)&&fc>=fq;
            if(!hasQ){
              return `<div style="padding:11px 12px;border:1px dashed rgba(255,0,68,0.18);color:#8B6F95;font-size:12px;font-style:italic">Disponível quando houver questões resolvidas</div>`;
            }
            if(allCorrect){
              return `<div style="padding:11px 12px;border:1px solid rgba(57,255,122,0.3);background:rgba(57,255,122,0.06);color:#39FF7A;font-size:12px">✓ Sem erros — bloco perfeito</div>`;
            }
            return `<select data-field="errorType" onchange="setForm('errorType',this.value)" style="width:100%;padding:11px 12px">
              <option value="" ${!f.errorType?'selected':''} style="background:#0F0617">Selecione o padrão de erro...</option>
              ${ERR_TYPES.map(t=>`<option value="${e(t)}" ${f.errorType===t?'selected':''} style="background:#0F0617">${e(t)}</option>`).join('')}
            </select>`;
          })()}
        </div>
        <div style="grid-column:1/-1;border:1px solid ${pctBorder};background:rgba(6,0,15,.6);padding:18px;box-shadow:${c.fpct!=null?`0 0 22px ${c.fpctSt.color}22`:'none'}">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
            ${lbl('Contador de Questões')}
            <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:#8B6F95;letter-spacing:.18em">OPCIONAL · AUTO-CALC %</div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1.3fr;gap:12px;align-items:center">
            <div>
              <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:#B080A0;letter-spacing:.18em;margin-bottom:6px">TOTAL</div>
              <input type="number" min="0" placeholder="0" value="${e(f.questions)}" data-field="questions" oninput="setFormSilent('questions',this.value);updatePctDisplay()" onchange="render()" style="width:100%;padding:14px 12px;text-align:center;font-weight:700;font-size:22px;background:rgba(255,0,68,.04);border:1px solid rgba(255,0,68,.18)">
            </div>
            <div>
              <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:#B080A0;letter-spacing:.18em;margin-bottom:6px">CORRETAS</div>
              <input type="number" min="0" max="${e(f.questions)||9999}" placeholder="0" value="${e(f.correct)}" data-field="correct" oninput="setFormCorrectSilent(this.value)" onchange="render()" style="width:100%;padding:14px 12px;text-align:center;font-weight:700;font-size:22px;background:${c.fcOverflow?'rgba(255,0,68,.15)':'rgba(57,255,122,.04)'};border:1px solid ${c.fcOverflow?'#FF0044':'rgba(57,255,122,.18)'}">
              ${c.fcOverflow?`<div class="req-hint">máx ${e(f.questions)}</div>`:''}
            </div>
            <div style="text-align:center;padding:10px;border:1px dashed ${pctBorder};background:rgba(6,0,15,.4)">
              <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:#B080A0;letter-spacing:.18em;margin-bottom:2px">ACERTO</div>
              <div id="live-pct" style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:34px;line-height:1;color:${pctColor};text-shadow:0 0 18px ${pctColor}cc">${c.fpct!=null?c.fpct+'%':'—'}</div>
              <div id="live-pct-label" style="font-family:'JetBrains Mono',monospace;font-size:8px;margin-top:4px;letter-spacing:.2em;text-transform:uppercase;color:${pctColor}">${c.fpct!=null?c.fpctSt.label:'AGUARDANDO DADOS'}</div>
            </div>
          </div>
        </div>
        <div style="grid-column:1/-1">
          ${lbl('Notas / Tópicos com Erro')}
          <textarea placeholder="Artigos, súmulas, pegadinhas, padrão de erro para revisão espaçada..." data-field="notes" onchange="setForm('notes',this.value)" rows="4" style="width:100%;padding:12px">${e(f.notes)}</textarea>
        </div>
        <div style="grid-column:1/-1;display:flex;gap:12px;align-items:center;margin-top:4px">
          <button onclick="${isEdit?'updateSession()':'saveSession()'}" ${c.canSave?'':'disabled'} style="padding:14px 28px;background:linear-gradient(180deg,rgba(255,0,68,.18),rgba(255,0,68,.05));border:1.5px solid #FF0044;color:#FFE6EE;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;letter-spacing:.2em;text-transform:uppercase;box-shadow:0 0 18px rgba(255,0,68,.45),inset 0 0 12px rgba(255,0,68,.15)">▸ ${isEdit?'Atualizar Sessão':'Registrar Sessão'}</button>
          <button onclick="resetForm()" style="padding:14px 20px;background:transparent;border:1px solid rgba(180,140,200,.25);color:#A98FB8;font-family:'Space Grotesk',sans-serif;font-size:12px;letter-spacing:.15em;text-transform:uppercase">Limpar</button>
          ${!c.canSave&&c.saveHint?`<div class="req-hint">↑ ${c.saveHint}</div>`:''}
          ${S.flash?`<span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#39FF7A;letter-spacing:.14em;text-shadow:0 0 8px #39FF7A">${S.flashMsg}</span>`:''}
        </div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:16px">
      <div style="${card()}">
        ${sectionTag('// preview')}
        <div style="border-left:3px solid ${previewColor};padding-left:12px;margin:10px 0 14px">
          <div style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;color:#FFE6EE">${e(f.discipline)||'—'}</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#B080A0;letter-spacing:.12em;margin-top:2px">${e(f.block)} — ${fmtLong(f.date)}</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          ${[['HORAS',!isNaN(fh)&&fh>0?fh.toFixed(1)+'h':'—','#FFE6EE',''],['XP +',xpGain>0?'+'+xpGain:'—','#FFB400','text-shadow:0 0 8px #FFB400'],['QUESTÕES',fq>0?fq:'—','#FFE6EE',''],['ERROS',erros>0?erros:'0','#FF0044','text-shadow:0 0 8px #FF0044']].map(([l,v,col,extra])=>`<div style="background:rgba(6,0,15,.5);padding:10px;border:1px solid rgba(255,255,255,.04)"><div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:#B080A0;letter-spacing:.18em">${l}</div><div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:${col};margin-top:2px;${extra}">${v}</div></div>`).join('')}
        </div>
      </div>
      <div style="border:1px dashed rgba(255,0,68,.22);background:rgba(15,6,23,.4);padding:16px">
        ${sectionTag('// blocos')}
        <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">
          ${BLOCKS.map(b=>`<div style="display:flex;gap:10px;align-items:flex-start"><div style="width:5px;height:5px;border-radius:50%;background:#FF0044;margin-top:5px;flex-shrink:0"></div><div><div style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:11px;color:#FFE6EE">${b} — ${BLOCK_META[b].sub}</div><div style="font-size:11px;color:#A98FB8;margin-top:1px">${BLOCK_META[b].hint}</div></div></div>`).join('')}
        </div>
      </div>
    </div>
  </div>
</div>`;
}

function buildHistory(c){
  const filterOpts=[{name:'ALL',short:'TODAS'},...getDiscs().map(d=>({name:d.name,short:d.short,color:d.color}))];
  let chips=filterOpts.map(f=>{
    const active=S.filter===f.name;
    return`<button onclick="setFilter('${e(f.name)}')" style="padding:5px 10px;background:${active?'rgba(255,0,68,.18)':'transparent'};border:1px solid ${active?'#FF0044':'transparent'};color:${active?'#FFE6EE':'#B080A0'};font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;${active?'box-shadow:0 0 8px rgba(255,0,68,.35)':''}">${f.short}</button>`;
  }).join('');

  let rows='';
  if(c.hist.length===0){
    rows=`<div style="padding:48px;text-align:center"><div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#8B6F95">// nenhum registro${S.filter!=='ALL'?' para esta disciplina':''}</div><div style="font-size:13px;color:#B080A0;margin-top:10px">${S.filter==='ALL'?'Registre sua primeira sessão em <span style="color:#FF0044">Nova Sessão</span>.':'Remova o filtro ou registre sessões desta disciplina.'}</div></div>`;
  } else {
    c.hist.forEach(h=>{
      rows+=`<div class="tt-row" style="display:grid;grid-template-columns:100px 1fr 80px 100px 1fr 90px;gap:12px;padding:14px 18px;border-bottom:1px solid rgba(255,0,68,.08);align-items:center;transition:background .15s;border-left:3px solid ${h.dc}">
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#A98FB8">${h.dateLabel}</div>
        <div><div style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;color:#FFE6EE">${e(h.discipline)}</div><div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:#8B6F95;margin-top:2px">${h.hours}h${h.questions>0?` · ${h.questions}q`:''} · ${e(h.block)}${h.errorType?` <span style="color:${h.errorType==='Sem erros'?'#39FF7A':'#FF7A99'};margin-left:4px">· ${e(h.errorType)}</span>`:''}</div></div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#B080A0">${e(h.block)}</div>
        <div><span style="display:inline-block;padding:4px 8px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11px;color:${h.pctColor};text-shadow:0 0 6px ${h.pctColor}aa;box-shadow:0 0 8px ${h.pctColor}44,inset 0 0 4px ${h.pctColor}22;border:1px solid ${h.pctColor}">${h.pctLabel}</span></div>
        <div style="font-size:12px;color:#A98FB8;line-height:1.5;max-height:38px;overflow:hidden">${e(h.notes)||'—'}</div>
        <div style="display:flex;gap:4px;justify-content:flex-end">
          <button class="edit-btn" onclick="editSession(${h.id})" title="Editar sessão">✎ editar</button>
          <button class="del-btn" onclick="deleteSession(${h.id})" title="Excluir sessão">✕</button>
        </div>
      </div>`;
    });
  }

  return`<div class="view-content">
  <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px">
    <div>${sectionTag('// log de sessões')}<h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;color:#FFE6EE">Histórico de Sessões</h1><div style="font-size:13px;color:#B080A0;margin-top:5px">${S.sessions.length} registros — exibindo ${c.hist.length}${S.filter!=='ALL'?' (filtrado)':''}</div></div>
    <div style="display:flex;gap:4px;padding:4px;border:1px solid rgba(255,0,68,.18);background:rgba(15,6,23,.65);flex-wrap:wrap;max-width:600px">${chips}</div>
  </div>
  <div style="${card('padding:0')}">
    <div style="display:grid;grid-template-columns:100px 1fr 80px 100px 1fr 90px;gap:12px;padding:12px 18px;border-bottom:1px solid rgba(255,0,68,.18);background:rgba(255,0,68,.04);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.2em;color:#B080A0;text-transform:uppercase">
      <div>Data</div><div>Disciplina</div><div>Bloco</div><div>Acerto</div><div>Notas</div><div></div>
    </div>
    <div style="max-height:600px;overflow-y:auto">${rows}</div>
  </div>
</div>`;
}

function buildEvolucao(c){
  const wfOpts=[{k:'all',l:'Tudo'},{k:'w1',l:'Esta semana'},{k:'w2',l:'1 sem atrás'},{k:'w3',l:'2 sem atrás'},{k:'w4',l:'3 sem atrás'},{k:'w5',l:'4 sem atrás'}];
  let wfChips=wfOpts.map(o=>{
    const active=S.weekFilter===o.k;
    return`<button onclick="setWeekFilter('${o.k}')" style="padding:6px 12px;background:${active?'rgba(255,0,68,.18)':'transparent'};border:1px solid ${active?'#FF0044':'rgba(255,0,68,.12)'};color:${active?'#FFE6EE':'#B080A0'};font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;${active?'box-shadow:0 0 8px rgba(255,0,68,.3)':''}">${o.l}</button>`;
  }).join('');

  let dbars=`<div style="display:grid;grid-template-columns:repeat(8,1fr);gap:12px;height:220px;align-items:flex-end;padding:0 4px">`;
  c.discBars.forEach(b=>{
    dbars+=`<div style="display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;gap:5px">
      <div style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11px;color:${b.color};text-shadow:0 0 6px ${b.color}aa">${b.accDisplay}</div>
      <div style="width:100%;max-width:44px;min-height:4px;height:${b.h};background:linear-gradient(180deg,${b.color},${b.color}44);box-shadow:0 0 14px ${b.color}66"></div>
    </div>`;
  });
  dbars+=`</div><div style="display:grid;grid-template-columns:repeat(8,1fr);gap:12px;margin-top:8px;padding:0 4px">`;
  c.discBars.forEach(b=>{dbars+=`<div style="text-align:center;font-family:'JetBrains Mono',monospace;font-size:9px;color:#B080A0;letter-spacing:.06em;text-transform:uppercase;line-height:1.3">${b.short}</div>`;});
  dbars+='</div>';

  {name:'TCU — Auditor de Controle Externo',discs:['Direito Constitucional','Direito Administrativo','Controle Externo','Auditoria Governamental','Administração Financeira e Orçamentária','Contabilidade Pública','Governança e Gestão Pública','Língua Portuguesa','Raciocínio Lógico']},

  {name:'Personalizado',discs:[]},
];

const DISC_COLORS_POOL = ['#FF2D66','#FF5577','#D946A8','#B864E8','#8A7CFF','#5AC8FF','#FFB400','#39FF7A','#FF8844','#CC66FF','#66CCFF','#FF66AA'];

function selectPreset(idx){
  const p = PRESETS[idx];
  S.examName = p.name;
  if(p.discs.length > 0){
    // Mapear disciplinas que NÃO estão no DISCS padrão como customDiscs
    const baseNames = DISCS.map(d=>d.name);
    S.customDiscs = p.discs
      .filter(name => !baseNames.includes(name))
      .map((name,i) => ({
        name,
        short: name.replace(/[a-z\s]/g,'').slice(0,8) || name.slice(0,6).toUpperCase(),
        color: DISC_COLORS_POOL[(DISCS.length + i) % DISC_COLORS_POOL.length],
        sub: ''
      }));
  } else {
    S.customDiscs = [];
  }
  render();
}

function finishOnboarding(){
  const nameEl = document.getElementById('ob-name');
  if(nameEl && nameEl.value.trim()) S.userName = nameEl.value.trim();

  if(S.examName === 'Personalizado'){
    const examEl = document.getElementById('ob-exam-custom');
    const discsEl = document.getElementById('ob-discs-custom');
    if(examEl && examEl.value.trim()) S.examName = examEl.value.trim();
    if(discsEl && discsEl.value.trim()){
      const lines = discsEl.value.split('\n').map(l=>l.trim()).filter(l=>l);
      const baseNames = DISCS.map(d=>d.name);
      S.customDiscs = lines
        .filter(name => !baseNames.includes(name))
        .map((name,i) => ({
          name,
          short: name.replace(/[a-z\s]/g,'').slice(0,8) || name.slice(0,6).toUpperCase(),
          color: DISC_COLORS_POOL[(DISCS.length + i) % DISC_COLORS_POOL.length],
          sub: ''
        }));
    }
  }

  S.setupDone = true;
  S.view = 'dashboard';
  saveLocal();
  render();
}

  }[S.sbStatus]||{dot:'#8B6F95',label:''};

  return`<div class="view-content">
  <div style="margin-bottom:28px">
    ${sectionTag('// configuração de nuvem')}
    <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;color:#FFE6EE">Configurar Supabase</h1>
    <div style="font-size:13px;color:#B080A0;margin-top:6px">Armazenamento na nuvem — gratuito, seus dados não somem se limpar o cache.</div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px" class="grid-2col">
    <div style="border:1px solid rgba(255,0,68,.18);background:rgba(15,6,23,.7);padding:24px">
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;color:#FF0044;margin-bottom:16px">PASSO 1 — CRIAR TABELA</div>
      <div style="font-size:13px;color:#A98FB8;margin-bottom:12px;line-height:1.7">Acesse <a href="https://supabase.com" target="_blank" style="color:#39FF7A">supabase.com</a>, crie uma conta gratuita, inicie um projeto novo e execute este SQL no <b style="color:#FFE6EE">SQL Editor</b>:</div>
      <div style="background:#06000F;border:1px solid rgba(255,0,68,.2);padding:14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#A98FB8;line-height:1.8;white-space:pre;overflow-x:auto">${e(SQL)}</div>
    </div>
    <div style="border:1px solid rgba(255,0,68,.18);background:rgba(15,6,23,.7);padding:24px">
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;color:#FF0044;margin-bottom:16px">PASSO 2 — INSERIR CREDENCIAIS</div>
      <div style="font-size:13px;color:#A98FB8;margin-bottom:18px;line-height:1.7">No projeto Supabase: <b style="color:#FFE6EE">Settings → API</b>. Copie a <b style="color:#FFE6EE">Project URL</b> e a <b style="color:#FFE6EE">anon public</b> key.</div>
      <div style="margin-bottom:14px">
        <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#FF0044;letter-spacing:.2em;margin-bottom:6px">PROJECT URL</div>
        <input id="sb-url-inp" type="text" placeholder="https://xxxxxxxxxxxx.supabase.co" value="${e(S.sbUrl)}" style="width:100%;padding:10px 12px;background:rgba(6,0,15,.6);border:1px solid rgba(255,0,68,.2);color:#FFE6EE;font-family:'JetBrains Mono',monospace;font-size:12px;box-sizing:border-box">
      </div>
      <div style="margin-bottom:20px">
        <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#FF0044;letter-spacing:.2em;margin-bottom:6px">ANON PUBLIC KEY</div>
        <input id="sb-key-inp" type="password" placeholder="eyJhbGciOi..." value="${e(S.sbKey)}" style="width:100%;padding:10px 12px;background:rgba(6,0,15,.6);border:1px solid rgba(255,0,68,.2);color:#FFE6EE;font-family:'JetBrains Mono',monospace;font-size:12px;box-sizing:border-box">
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <button onclick="saveSbConfig()" style="padding:12px 24px;background:linear-gradient(180deg,rgba(255,0,68,.18),rgba(255,0,68,.05));border:1.5px solid #FF0044;color:#FFE6EE;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;letter-spacing:.18em;text-transform:uppercase;box-shadow:0 0 18px rgba(255,0,68,.35)">▸ Conectar</button>
        <button onclick="setView('dashboard')" style="padding:12px 18px;background:transparent;border:1px solid rgba(180,140,200,.25);color:#A98FB8;font-family:'Space Grotesk',sans-serif;font-size:12px;letter-spacing:.12em;text-transform:uppercase">Fechar</button>
        ${S.sbUrl?`<button onclick="disconnectSb()" style="padding:12px 18px;background:transparent;border:1px solid rgba(255,0,68,.2);color:#B080A0;font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase">Desconectar</button>`:''}
      </div>
      <div style="margin-top:16px;padding:12px;border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px">
        <div style="width:8px;height:8px;border-radius:50%;background:${sbInfo.dot};box-shadow:0 0 8px ${sbInfo.dot};flex-shrink:0"></div>

    <b style="color:#A98FB8">Por que Supabase?</b> O plano gratuito suporta 500MB de banco de dados e requests ilimitados — mais do que suficiente para anos de sessões de estudo. Seus dados ficam na nuvem e aparecem em qualquer dispositivo. Sem o Supabase, os dados ficam só no navegador e podem ser perdidos ao limpar o cache.
  </div>
</div>`;}

function buildFooter(){
  return`<div style="margin-top:40px;padding-top:16px;padding-bottom:80px;border-top:1px dashed rgba(255,0,68,.12);display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:#8B6F95;letter-spacing:.15em;flex-wrap:wrap;gap:10px">
  <span>STUDY_TRACKER // ${S.sessions.length} sessões registradas</span>
  <div style="display:flex;gap:8px">
    <button onclick="setView('setup')" style="padding:5px 12px;background:${sbOk()?'rgba(57,255,122,.08)':'transparent'};border:1px solid ${sbOk()?'rgba(57,255,122,.4)':'rgba(255,0,68,.2)'};color:${sbOk()?'#39FF7A':'#B080A0'};font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase" title="${sbOk()?'Supabase conectado — clique para gerenciar':'Configurar armazenamento em nuvem'}">${sbOk()?'☁ NUVEM ATIVA':'☁ CONFIGURAR NUVEM'}</button>
    <button onclick="importData()" style="padding:5px 12px;background:transparent;border:1px solid rgba(255,0,68,.2);color:#B080A0;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase">↑ IMPORTAR</button>
    <button onclick="exportData()" style="padding:5px 12px;background:rgba(255,0,68,.06);border:1px solid rgba(255,0,68,.3);color:#A98FB8;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase">↓ EXPORTAR JSON</button>
    <button onclick="clearAll()" style="padding:5px 12px;background:transparent;border:1px solid rgba(255,0,68,.15);color:#8B6F95;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase" title="Requer digitar LIMPAR para confirmar">LIMPAR TUDO</button>
  </div>
</div>`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  // Salva estado do foco antes de reconstruir o DOM
  const af=document.activeElement;
  const adf=af?.getAttribute('data-field')||null;
  const ss=af?.selectionStart??null;
  const se=af?.selectionEnd??null;

  const c=computed();
  let vHtml='';
  if(!S.setupDone && S.sessions.length===0 && S.view!=='setup') vHtml=buildOnboarding();
  else if(S.view==='setup')vHtml=buildSetup();
  else if(S.view==='dashboard')vHtml=buildDashboard(c);
  else if(S.view==='session')vHtml=buildSession(c);
  else if(S.view==='history')vHtml=buildHistory(c);
  else vHtml=buildEvolucao(c);
  const isOnboarding = !S.setupDone && S.sessions.length===0 && S.view!=='setup';
  const headerHtml = isOnboarding ? '' : buildHeader();
  const footerHtml = isOnboarding ? '' : buildFooter();
  const timerHtml = isOnboarding ? '' : buildTimer();
  document.getElementById('app').innerHTML=headerHtml+vHtml+footerHtml+timerHtml;

  // Restaura foco no mesmo campo após rebuild do DOM
  if(adf){
    const el=document.querySelector('[data-field="'+adf+'"]');
    if(el){
      el.focus();
      // setSelectionRange só funciona em <input type=text/number> e <textarea>
      const tag=el.tagName;
      const okTag=tag==='INPUT'||tag==='TEXTAREA';
      const okType=tag!=='INPUT'||['text','number','search','url','tel','password'].includes(el.type);
      if(ss!==null&&okTag&&okType&&typeof el.setSelectionRange==='function'){
        try{el.setSelectionRange(ss,se);}catch(_){}
      }
    }
  }
}

// ─── FLASH ────────────────────────────────────────────────────────────────────
function flash(msg){S.flash=true;S.flashMsg=msg;render();setTimeout(()=>{S.flash=false;S.flashMsg='';render();},2400);}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function setView(v){S.view=v;S.flash=false;render()}
function setForm(k,v){S.form={...S.form,[k]:v};render()}
function setFormSilent(k,v){
  // Atualiza state sem re-render — usado em onchange (blur) e em campos numéricos
  S.form={...S.form,[k]:v};
}
function updatePctDisplay(){
  // Calcula e atualiza inline o % de acerto, sem rebuildar a view
  const fq=parseInt(S.form.questions,10);
  const fc=parseInt(S.form.correct,10);
  if(isNaN(fq)||fq<=0||isNaN(fc)){
    const el=document.getElementById('live-pct'); if(el) el.textContent='—';
    const lb=document.getElementById('live-pct-label'); if(lb) lb.textContent='AGUARDANDO DADOS';
    return;
  }
  const pct=Math.round((Math.min(fc,fq)/fq)*100);
  const st=statusFor(pct/100,true);
  const el=document.getElementById('live-pct');
  const lb=document.getElementById('live-pct-label');
  if(el){ el.textContent=pct+'%'; el.style.color=st.color; el.style.textShadow='0 0 18px '+st.color+'cc'; }
  if(lb){ lb.textContent=st.label; lb.style.color=st.color; }
}
function setFormCorrect(v){
  const q=parseInt(S.form.questions,10);
  const c=parseInt(v,10);
  if(!isNaN(q)&&q>0&&!isNaN(c)&&c>q){S.form={...S.form,correct:String(q)};render();return;}
  S.form={...S.form,correct:v};render();
}
function setFormCorrectSilent(v){
  // Versão sem re-render — atualiza só o display do %
  const q=parseInt(S.form.questions,10);
  const c=parseInt(v,10);
  if(!isNaN(q)&&q>0&&!isNaN(c)&&c>q){S.form={...S.form,correct:String(q)};render();return;}
  S.form={...S.form,correct:v};
  updatePctDisplay();
}
function setFilter(f){S.filter=f;render()}
function setWeekFilter(f){S.weekFilter=f;render()}
function setExamDate(d){S.examDate=d;saveLocal();render()}

function saveSession(){
  const f=S.form;
  const hours=parseFloat(f.hours),questions=parseInt(f.questions,10)||0,correct=Math.min(parseInt(f.correct,10)||0,questions);
  if(!f.date||isNaN(hours)||hours<=0)return;
  const autoErr=(questions>0&&correct===questions)?'Sem erros':(questions>0?(f.errorType||''):'');const sess={id:Date.now(),date:f.date,block:f.block,discipline:f.discipline,hours,questions,correct,errorType:autoErr,notes:f.notes||''};
  S.sessions=[sess,...S.sessions];
  S.form={date:todayISO(),block:f.block,discipline:f.discipline||getDiscs()[0]?.name||'',hours:'',questions:'',correct:'',errorType:'',notes:''};
  if(!sbOk())saveLocal();
  flash('▲ SESSÃO REGISTRADA +'+Math.round(hours*10)+' XP');
  if(sbOk())sbReq('sessions',{method:'POST',headers:{'Prefer':'return=minimal'},body:JSON.stringify(sToDB(sess))}).catch(err=>flash('⚠ Supabase: '+err.message));
}

function editSession(id){
  const sess=S.sessions.find(s=>s.id===id);
  if(!sess)return;
  S.editId=id;
  S.form={date:sess.date,block:sess.block,discipline:sess.discipline,hours:String(sess.hours),questions:String(sess.questions),correct:String(sess.correct),errorType:sess.errorType,notes:sess.notes};
  S.view='session';render();
}

function updateSession(){
  const f=S.form;
  const hours=parseFloat(f.hours),questions=parseInt(f.questions,10)||0,correct=Math.min(parseInt(f.correct,10)||0,questions);
  if(!f.date||isNaN(hours)||hours<=0)return;
  const eid=S.editId;
  const existing=S.sessions.find(s=>s.id===eid)||{};
  const autoErrU=(questions>0&&correct===questions)?'Sem erros':(questions>0?(f.errorType||''):'');const updated={...existing,date:f.date,block:f.block,discipline:f.discipline,hours,questions,correct,errorType:autoErrU,notes:f.notes||''};
  S.sessions=S.sessions.map(s=>s.id===eid?updated:s);
  S.editId=null;
  S.form={date:todayISO(),block:'Bloco A',discipline:S.form.discipline||getDiscs()[0]?.name||'',hours:'',questions:'',correct:'',errorType:'',notes:''};
  if(!sbOk())saveLocal();
  S.view='history';flash('▲ SESSÃO ATUALIZADA');
  if(sbOk())sbReq('sessions?id=eq.'+eid,{method:'PATCH',body:JSON.stringify(sToDB(updated))}).catch(err=>flash('⚠ Supabase: '+err.message));
}

function cancelEdit(){S.editId=null;resetForm();S.view='history';render()}
function setUserName(v){S.userName=v;saveLocal();}
function resetForm(){S.form={date:todayISO(),block:'Bloco A',discipline:S.form.discipline,hours:'',questions:'',correct:'',errorType:'',notes:''};S.flash=false;render()}
function deleteSession(id){if(!confirm('Excluir esta sessão?'))return;S.sessions=S.sessions.filter(s=>s.id!==id);if(!sbOk())saveLocal();render();if(sbOk())sbReq('sessions?id=eq.'+id,{method:'DELETE'}).catch(err=>flash('⚠ Supabase: '+err.message));}

// ─── INIT ─────────────────────────────────────────────────────────────────────
load();if(S.sbStatus!=='connecting')render();

// Phrase cycling — atualiza só o elemento, sem re-render completo
setInterval(()=>{
  const el=document.getElementById('motiv-phrase');
  if(!el)return;
  S.phraseIdx=(S.phraseIdx+1)%PHRASES.length;
  el.style.opacity='0';
  setTimeout(()=>{el.textContent=PHRASES[S.phraseIdx];el.style.opacity='1';},600);
},8000);


// ─── CRONÔMETRO POMODORO (HORAS LÍQUIDAS) ─────────────────────────────────────
let timerInterval = null;

function timerStart(){
  if(S.timer.active){
    if(S.timer.paused){
      S.timer.paused = false;
      S.timer.lastTickMs = Date.now();
      runTimerLoop();
    }
    return;
  }
  S.timer = { active:true, paused:false, startTs:Date.now(), accumMs:0, lastTickMs:Date.now() };
  runTimerLoop();
  render();
}

function timerPause(){
  if(!S.timer.active || S.timer.paused) return;
  S.timer.accumMs += Date.now() - S.timer.lastTickMs;
  S.timer.paused = true;
  if(timerInterval){ clearInterval(timerInterval); timerInterval = null; }
  S.timerDisplay = formatTimer(S.timer.accumMs);
  render();
}

function timerResume(){
  if(!S.timer.paused) return;
  S.timer.paused = false;
  S.timer.lastTickMs = Date.now();
  runTimerLoop();
  render();
}

function timerStop(){
  if(!S.timer.active) return;
  if(!S.timer.paused) S.timer.accumMs += Date.now() - S.timer.lastTickMs;
  const totalMs = S.timer.accumMs;
  const totalH = (totalMs / 3600000);
  if(timerInterval){ clearInterval(timerInterval); timerInterval = null; }
  S.timer = { active:false, paused:false, startTs:0, accumMs:0, lastTickMs:0 };
  S.timerDisplay = '00:00:00';
  if(totalMs < 60000){
    flash('▽ Timer cancelado (< 1 min)');
    render();
    return;
  }
  const rounded = Math.round(totalH * 4) / 4;
  S.form = { ...S.form, hours: String(rounded.toFixed(2)) };
  S.view = 'session';
  flash('▲ TIMER FINALIZADO — ' + rounded.toFixed(2) + 'h pré-preenchida');
  render();
}

function timerReset(){
  if(timerInterval){ clearInterval(timerInterval); timerInterval = null; }
  S.timer = { active:false, paused:false, startTs:0, accumMs:0, lastTickMs:0 };
  S.timerDisplay = '00:00:00';
  render();
}

function runTimerLoop(){
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if(!S.timer.active || S.timer.paused) return;
    const elapsed = S.timer.accumMs + (Date.now() - S.timer.lastTickMs);
    S.timerDisplay = formatTimer(elapsed);
    const el = document.getElementById('timer-display');
    if(el) el.textContent = S.timerDisplay;
  }, 1000);
}

function formatTimer(ms){
  const s = Math.floor(ms/1000);
  const h = Math.floor(s/3600);
  const m = Math.floor((s%3600)/60);
  const sec = s%60;
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

function buildTimer(){
  const t = S.timer;
  const running = t.active && !t.paused;
  const paused = t.active && t.paused;
  const idle = !t.active;

  const color = running ? '#39FF7A' : paused ? '#FFB400' : '#FF0044';
  const label = running ? 'CRONOMETRANDO' : paused ? 'PAUSADO' : 'PRONTO';

  return `<div id="timer-widget" style="position:fixed;bottom:20px;right:20px;z-index:1000;background:rgba(15,6,23,0.95);border:1px solid ${color};box-shadow:0 0 24px ${color}44,inset 0 0 12px ${color}11;backdrop-filter:blur(8px);padding:14px 18px;font-family:'JetBrains Mono',monospace;min-width:260px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:12px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="width:8px;height:8px;border-radius:50%;background:${color};box-shadow:0 0 6px ${color};${running?'animation:pulseGlow 1.6s infinite':''}"></span>
        <span style="font-size:9px;color:${color};letter-spacing:.2em;text-shadow:0 0 4px ${color}">${label}</span>
      </div>
      <span style="font-size:9px;color:#8B6F95;letter-spacing:.15em">POMODORO</span>
    </div>
    <div id="timer-display" style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:32px;color:${color};text-shadow:0 0 16px ${color}aa;letter-spacing:.05em;text-align:center;margin-bottom:12px">${S.timerDisplay}</div>
    <div style="display:flex;gap:6px;justify-content:center">
      ${idle ? `<button onclick="timerStart()" style="flex:1;padding:8px 14px;background:rgba(57,255,122,0.12);border:1px solid #39FF7A;color:#39FF7A;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:10px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer">▶ INICIAR</button>` : ''}
      ${running ? `<button onclick="timerPause()" style="flex:1;padding:8px 12px;background:rgba(255,180,0,0.12);border:1px solid #FFB400;color:#FFB400;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:10px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer">⏸ PAUSAR</button>` : ''}
      ${paused ? `<button onclick="timerResume()" style="flex:1;padding:8px 12px;background:rgba(57,255,122,0.12);border:1px solid #39FF7A;color:#39FF7A;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:10px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer">▶ RETOMAR</button>` : ''}
      ${t.active ? `<button onclick="timerStop()" style="flex:1;padding:8px 12px;background:rgba(255,0,68,0.12);border:1px solid #FF0044;color:#FF0044;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:10px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer">⏹ FINALIZAR</button>` : ''}
    </div>
    ${t.active && !t.paused ? `<div style="margin-top:10px;font-size:9px;color:#8B6F95;text-align:center;letter-spacing:.1em">Pausa em distrações = horas líquidas</div>` : ''}
    ${t.active ? '' : `<div style="margin-top:10px;font-size:9px;color:#8B6F95;text-align:center;letter-spacing:.1em">Conte só o tempo de foco real</div>`}
  </div>`;
}

// ─── PWA — Service Worker com auto-update ────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .then(reg => {
        console.log('[SW] Registrado:', reg.scope);
        // Checa update a cada 30 minutos enquanto o app está aberto
        setInterval(() => reg.update(), 30 * 60 * 1000);
        reg.addEventListener('updatefound', () => {
          const newSW = reg.installing;
          if (!newSW) return;
          newSW.addEventListener('statechange', () => {
            if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
              // Nova versão pronta — notifica via flash
              if (typeof flash === 'function') {
                flash('▲ NOVA VERSÃO DISPONÍVEL — RECARREGANDO...');
                setTimeout(() => { newSW.postMessage({ type: 'SKIP_WAITING' }); location.reload(); }, 2500);
              } else {
                newSW.postMessage({ type: 'SKIP_WAITING' });
                location.reload();
              }
            }
          });
        });
      })
      .catch(err => console.warn('[SW] Falha no registro:', err));

    // Escuta mensagens do SW (versão atualizada)
    navigator.serviceWorker.addEventListener('message', e => {
      if (e.data && e.data.type === 'SW_UPDATED') {
        console.log('[SW] Versão ativa:', e.data.version);
      }
    });
  });
}
</script>
